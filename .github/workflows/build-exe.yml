name: Build LensDesigner Pro EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install numpy matplotlib cadquery pyinstaller
      - name: Build EXE onedir
        shell: pwsh
        run: |
          if (Test-Path "icon.ico") {
            pyinstaller --noconfirm --onedir --windowed --icon=icon.ico --name LensDesignerPro --runtime-hook runtime_hook.py --collect-all cadquery --collect-all OCP --collect-all vtkmodules --collect-all casadi LensDesignerPro.py
          } else {
            pyinstaller --noconfirm --onedir --windowed --name LensDesignerPro --runtime-hook runtime_hook.py --collect-all cadquery --collect-all OCP --collect-all vtkmodules --collect-all casadi LensDesignerPro.py
          }
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LensDesignerPro-Windows-Folder
          path: dist/LensDesignerPro
