name: Build LensDesigner EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy cadquery pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name LensDesigner LensDesigner.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LensDesigner-Windows-EXE
          path: dist/LensDesigner.exe
